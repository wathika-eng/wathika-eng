name: Metrics

on:
  schedule: [{ cron: "0 0 * * 1" }]
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}

          user: wathika-eng
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Nairobi

          plugin_introduction: yes
          plugin_introduction_title: yes

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used, recently-used
          plugin_languages_details: percentage
          plugin_languages_threshold: 1%

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, pr, issue, review, release

          plugin_lines: yes
          plugin_lines_sections: base, repositories, history
          plugin_lines_repositories_limit: 4
          plugin_lines_history_limit: 1
          plugin_lines_delay: 30

          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: B
          plugin_achievements_limit: 8

          plugin_notable: yes
          plugin_notable_types: commit, pull_request, issue

          plugin_repositories: yes
          plugin_repositories_pinned: 4

          plugin_stars: yes
          plugin_stars_limit: 4

          committer_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.wakatime.svg
          token: NOT_NEEDED
          base: ""
          template: classic
          config_timezone: Africa/Nairobi

          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_days: 30
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors
          plugin_wakatime_limit: 5
          plugin_wakatime_languages_other: yes

          committer_token: ${{ secrets.GITHUB_TOKEN }}
